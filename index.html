<!DOCTYPE html>
<html>

<head>
<title>SmartRecycle System</title>

<style>

body{
font-family: Arial;
background:#6a89a7;
text-align:center;
}

h1{
background:#384959;
color: whitesmoke;;
padding:20px;
}

.card{
background:#384959;
margin:20px auto;
padding:20px;
width:300px;
border-radius:10px;
box-shadow:0px 2px 6px gray;
}

button{
background:#a5f9fa;
color:#ccc;;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

table{
margin:20px auto;
border-collapse:collapse;
width:80%;
}

th, td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#384959
color#ccc
;
}

</style>
</head>

<body>

<h1>SmartRecycle - School Recycling System</h1>

<div class="card">
<h2>Latest Scan</h2>
<p id="material">Material: Plastic</p>
<p id="weight">Weight: 0.5 kg</p>
</div>

<div class="card">

<h2>Register Recycler</h2>

<input type="text" id="nameInput" placeholder="Enter your name">
<br><br>

<button onclick="addRecord()">Submit</button>

</div>

<h2>Recycling Records</h2>

<table id="recordTable">

<tr>
<th>Name</th>
<th>Material</th>
<th>Weight</th>
</tr>

</table>

<script>

function addRecord(){

let name = document.getElementById("nameInput").value;
let material = document.getElementById("material").innerText.replace("Material: ","");
let weight = document.getElementById("weight").innerText.replace("Weight: ","");

if(name === ""){
alert("Please enter your name");
return;
}

let table = document.getElementById("recordTable");

let row = table.insertRow();

let cell1 = row.insertCell(0);
let cell2 = row.insertCell(1);
let cell3 = row.insertCell(2);

cell1.innerHTML = name;
cell2.innerHTML = material;
cell3.innerHTML = weight;

document.getElementById("nameInput").value = "";

}

</script>

</body>

</html>
